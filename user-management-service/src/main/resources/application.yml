# Default admin user: created on first startup if not present (run every time, create only if missing)
app:
  default-admin:
    enabled: true
    name: Admin
    email: admin@gmail.com
    password: admin123

spring:
  application:
    name: user-management-service
  config:
    import: configserver:${CONFIG_SERVER_URL:http://localhost:8888}

  cloud:
    config:
      fail-fast: true
      retry:
        max-attempts: 10
        initial-interval: 2000    # 2 sec
        multiplier: 1.5
        max-interval: 10000